name = "studyplanner-mcp"
main = "src/index.ts"
compatibility_date = "2026-06-12"

[vars]
# Used to build request paths and as a fallback when the service binding is
# absent (e.g. local dev). Override with a custom StudyPlanner API domain if one
# is managed in Cloudflare.
STUDYPLANNER_AI_BASE_URL = "https://studyplanner-api.ben-tischberger.workers.dev"

# Same-account workers.dev subrequests fail with 404, so the MCP worker reaches
# the AI facade worker through a service binding instead of its public URL.
[[services]]
binding = "STUDYPLANNER_API"
service = "studyplanner-api"
