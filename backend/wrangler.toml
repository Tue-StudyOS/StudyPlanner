name = "studyplanner-api"
main = "src/main.py"
compatibility_date = "2025-05-20"
compatibility_flags = ["python_workers"]
workers_dev = true

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://studyplaner.pages.dev,https://*.studyplaner.pages.dev,http://localhost:5173"
AUTH_TOKEN_TTL_SECONDS = "2592000"

# Active runtime D1 for the current deployed app.
# studyplanner-db is the approved production database (multi-period ALMA catalog, integrate_new_db cutover).
# The database name and id are public Cloudflare binding config; AUTH_TOKEN_SECRET stays a Worker secret.
[[d1_databases]]
binding = "DB"
database_name = "studyplanner-db"
database_id = "80ca9092-ddc6-454a-b04a-8ccae85ef2f5"
